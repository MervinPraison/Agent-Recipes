name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  claude-response:
    env:
      ISSUE_NUMBER_RESOLVED: ${{ github.event.issue.number }}
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
      ) &&
      (
        !contains(github.actor, '[bot]') ||
        github.actor == 'github-actions[bot]' ||
        github.actor == 'praisonai-triage-agent[bot]'
      ) &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'cursor[bot]' &&
      github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check for Fork PR
        id: check_fork
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const isPR = context.payload.issue?.pull_request
              || context.eventName === 'pull_request_review'
              || context.eventName === 'pull_request_review_comment';
            if (!isPR) {
              core.setOutput('is_pr', 'false');
              core.setOutput('is_fork', 'false');
              core.setOutput('merge_state', '');
              return;
            }
            const prNumber = context.payload.pull_request?.number
              || context.payload.issue?.number;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            let mergeState = '';
            try {
              const gql = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) { mergeStateStatus }
                  }
                }`,
                { owner: context.repo.owner, repo: context.repo.repo, number: prNumber }
              );
              mergeState = (gql.repository.pullRequest.mergeStateStatus || '').toUpperCase();
            } catch (e) {
              core.warning(`GraphQL mergeStateStatus failed: ${e.message}`);
            }
            if (!mergeState) {
              mergeState = (pr.data.mergeable_state || pr.data.merge_state_status || '').toUpperCase();
            }
            core.setOutput('is_pr', 'true');
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('pr_branch', pr.data.head.ref);
            core.setOutput('head_repo', pr.data.head.repo?.full_name || '');
            core.setOutput('merge_state', mergeState);
            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;
            if (pr.data.head.repo && pr.data.head.repo.full_name !== baseRepo) {
              core.setOutput('is_fork', 'true');
              return;
            }
            core.setOutput('is_fork', 'false');

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          ref: ${{ steps.check_fork.outputs.is_pr == 'true' && format('refs/pull/{0}/head', steps.check_fork.outputs.pr_number) || github.event.repository.default_branch }}

      - name: Fetch PR branch
        if: steps.check_fork.outputs.is_pr == 'true' && steps.check_fork.outputs.is_fork != 'true'
        env:
          PR_BRANCH: ${{ steps.check_fork.outputs.pr_branch }}
          PR_NUMBER: ${{ steps.check_fork.outputs.pr_number }}
        run: |
          git fetch origin "pull/${PR_NUMBER}/head:${PR_BRANCH}"
          git checkout "${PR_BRANCH}"
          git fetch origin main

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@beta
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_TOKEN }}
          model: claude-opus-4-8
          trigger_phrase: "@claude"
          label_trigger: "claude"
          allowed_bots: "praisonai-triage-agent[bot]"
          timeout_minutes: "30"
          direct_prompt: |
            ${{ steps.check_fork.outputs.is_fork == 'true' && 'CRITICAL: FORK PR — comment only, do not push.\n\n' || (steps.check_fork.outputs.is_pr == 'true' && 'NOTE: Internal PR on MervinPraison/Agent-Recipes — you may push to this branch.\n\n' || '') }}
            ${{ steps.check_fork.outputs.is_pr == 'true' && format('CONTEXT: PR #{0} on branch {1}. merge_state={2}.\n\n', steps.check_fork.outputs.pr_number, steps.check_fork.outputs.pr_branch, steps.check_fork.outputs.merge_state) || '' }}
            You are working on MervinPraison/Agent-Recipes — distributable agent recipe templates for PraisonAI.

            Primary scope: `agent_recipes/`, `agent_recipes/templates/`, `tests/`, `pyproject.toml`. Follow README.md and existing recipe patterns (`agents.yaml`, `tools.py`, `requires`).

            STEP 0 — GIT & GITHUB CLI:
            git config --global user.name "MervinPraison"
            git config --global user.email "454862+MervinPraison@users.noreply.github.com"
            gh auth setup-git

            STEP 1 — READ REQUEST:
            Read the issue/PR and all comments. Implement with minimal, focused changes.

            STEP 2 — LAYER VALIDATION:
            This repo IS the **Recipes/Templates** layer.
            - **Implement here:** new recipes, template fixes, dependency checks, recipe tests
            - **Route to PraisonAI (core):** agent runtime, protocols → MervinPraison/PraisonAI
            - **Route to PraisonAI-Tools:** agent-callable third-party tools → MervinPraison/PraisonAI-Tools
            - **Route to PraisonAI-Plugins:** lifecycle hooks/guardrails → MervinPraison/PraisonAI-Plugins
            - **Route to PraisonAIDocs:** documentation pages → MervinPraison/PraisonAIDocs

            ${{ steps.check_fork.outputs.is_pr == 'true' && steps.check_fork.outputs.is_fork != 'true' && steps.check_fork.outputs.merge_state == 'DIRTY' && format('STEP 3 — RESOLVE MERGE CONFLICTS ON PR (branch: {0}, PR #{1}):\n- git fetch origin main && git rebase origin/main\n- Resolve conflicts, git push --force-with-lease origin {0}\n', steps.check_fork.outputs.pr_branch, steps.check_fork.outputs.pr_number) || '' }}
            ${{ steps.check_fork.outputs.is_pr == 'true' && steps.check_fork.outputs.is_fork != 'true' && steps.check_fork.outputs.merge_state != 'DIRTY' && format('STEP 3 — IMPLEMENT ON PR branch {0} (PR #{1}): commit and push to origin {0}\n', steps.check_fork.outputs.pr_branch, steps.check_fork.outputs.pr_number) || '' }}
            ${{ steps.check_fork.outputs.is_pr != 'true' && 'STEP 3 — BRANCH:\nBRANCH="claude/issue-${{ env.ISSUE_NUMBER_RESOLVED }}-$(date +%Y%m%d-%H%M%S)"\ngit checkout -b "$BRANCH"\n' || '' }}

            STEP 4 — TEST:
            Run targeted pytest for changed recipes (e.g. pytest tests/unit -q).

            ${{ steps.check_fork.outputs.is_pr == 'true' && 'STEP 5 — SKIP gh pr create; already on an open PR.\n' || 'STEP 5 — If you committed: push branch and open PR with gh pr create.\n' }}

          allowed_tools: |
            Bash(git:*)
            Bash(python:*)
            Bash(pip:*)
            Bash(pytest:*)
            Bash(gh:*)
            Bash(uv:*)
            View
            GlobTool
            GrepTool
            Edit
            Replace
