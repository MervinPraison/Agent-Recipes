metadata:
  name: ai-log-analyzer
  requires:
    env:
      - OPENAI_API_KEY
    variables:
      - log_content

# =============================================================================
# AI LOG ANALYZER - Analyze logs for issues and patterns
# =============================================================================

agents:
  analyzer:
    role: Log Analyst
    goal: Analyze logs to identify errors, patterns, and anomalies.
    backstory: DevOps engineer who debugs production issues from logs.
    tools: []
    llm: gpt-4o-mini

steps:
  - agent: analyzer
    action: |
      Analyze these logs: {{log_content}}
      
      Identify:
      1. **Errors**: Error messages with severity
      2. **Warnings**: Warning patterns
      3. **Anomalies**: Unusual patterns or spikes
      4. **Timeline**: When issues occurred
      5. **Root Cause**: Likely cause of issues
      6. **Recommendations**: How to fix or prevent
    expected_output: "Log analysis with errors, patterns, and recommendations."
