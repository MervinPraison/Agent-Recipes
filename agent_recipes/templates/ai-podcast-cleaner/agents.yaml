metadata:
  name: ai-podcast-cleaner
  requires:
    env:
      - OPENAI_API_KEY
    variables:
      - input
      - output
      - preset

agents:
  audio_processor:
    role: Audio Engineer
    goal: Clean and enhance podcast audio.
    backstory: |
      AI audio engineer specializing in podcast production.
      Uses ffmpeg and audio processing tools to clean recordings,
      remove noise, normalize levels, and trim silences.
    tools:
      - shell_tool
    llm: gpt-4o-mini

  transcriber:
    role: Transcription Specialist
    goal: Generate accurate transcripts with timestamps.
    backstory: |
      AI transcription specialist using OpenAI Whisper.
      Generates accurate transcripts with word-level timestamps
      and identifies natural chapter breaks in content.
    tools:
      - shell_tool
    llm: gpt-4o-mini

steps:
  - agent: audio_processor
    action: |
      Process the input audio file: {{input}}
      
      Steps:
      1. Probe audio to get metadata (duration, format, sample rate)
      2. Apply noise reduction if needed
      3. Normalize audio levels to -16 LUFS
      4. Remove long silences (>0.5s)
      5. Export cleaned audio as MP3 to {{output}}
      
      Preset: {{preset}}
    expected_output: "Cleaned audio file with normalized volume, reduced noise, and trimmed silences."

  - agent: transcriber
    action: |
      Transcribe the cleaned audio from {{output}}/cleaned.mp3.
      
      Steps:
      1. Use Whisper API to transcribe with word timestamps
      2. Generate plain text transcript
      3. Generate SRT caption file
      4. Identify chapter breaks based on content
      5. Create chapters.json with timestamps and titles
    expected_output: "transcript.txt, transcript.srt, and chapters.json files."
